<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Enter password</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #f6f9fc;
        color: #0a2540;
      }
      .wall {
        width: 100%;
        max-width: 360px;
        padding: 28px 24px 32px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 12px 40px rgba(15, 31, 68, 0.08);
        border: 1px solid #e3e8ee;
      }
      .wall h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 600;
      }
      .wall p {
        margin: 0 0 20px;
        font-size: 14px;
        line-height: 1.45;
        color: #425466;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 8px;
      }
      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        font-size: 16px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        margin-bottom: 16px;
      }
      input[type="password"]:focus {
        outline: 2px solid #635bff;
        outline-offset: 1px;
      }
      button {
        width: 100%;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        background: #635bff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #4b4ce0;
      }
      .msg {
        margin-top: 12px;
        font-size: 13px;
        color: #df1c41;
        min-height: 1.25em;
      }
    </style>
  </head>
  <body>
    <div class="wall">
      <h1>Password required</h1>
      <p>This preview is protected. Enter the password to continue.</p>
      <form id="gate-form" autocomplete="off">
        <label for="gate-password">Password</label>
        <input
          id="gate-password"
          name="password"
          type="password"
          required
          autofocus
          maxlength="128"
          spellcheck="false"
          autocorrect="off"
        />
        <button type="submit">Continue</button>
        <p id="gate-error" class="msg" role="alert" aria-live="polite"></p>
      </form>
    </div>
    <script>
      (function () {
        var PASS = "test";
        var KEY = "stripe_lp_unlock";

        try {
          if (localStorage.getItem(KEY) === "1") {
            location.replace("index.html");
            return;
          }
          if (sessionStorage.getItem(KEY) === "1") {
            localStorage.setItem(KEY, "1");
            location.replace("index.html");
            return;
          }
        } catch (e) {}

        var form = document.getElementById("gate-form");
        var input = document.getElementById("gate-password");
        var err = document.getElementById("gate-error");

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          err.textContent = "";
          if ((input.value || "") === PASS) {
            try {
              localStorage.setItem(KEY, "1");
            } catch (ex) {}
            location.replace("index.html");
          } else {
            err.textContent = "Incorrect password.";
            input.select();
          }
        });
      })();
    </script>
  </body>
</html>
